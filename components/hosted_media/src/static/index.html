<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Screencrash [Media]</title>
  </head>
  <body>
    <!-- Content will be automatically added by scripts here -->
    <script src="./script.js" type="module"></script>
    <!-- Play a looping clip of silence to avoid the computer's audio going to sleep -->
    <audio
      id="audio-keepalive"
      class="audio-media hidden"
      src="./silence.wav"
      loop
    ></audio>
  </body>
</html>
